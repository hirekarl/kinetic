name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + type check ──────────────────────────────────────────────
  backend-quality:
    name: Backend — ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/kinetic --strict

  # ── Backend: tests + coverage ───────────────────────────────────────────────
  backend-test:
    name: Backend — pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      # Integration tests are excluded here; they require GEMINI_API_KEY and
      # are run manually or in a separate environment. Coverage is reported
      # but the threshold gate is enforced by /qa-reviewer at handoff time.
      - run: uv run pytest -m "not integration" --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  # ── Frontend: type check + lint + unit tests + build ───────────────────────
  frontend:
    name: Frontend — typecheck, lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── Frontend: e2e + accessibility audit ────────────────────────────────────
  e2e:
    name: Frontend — Playwright + axe
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      # Install browsers + OS deps on cache miss; only deps on cache hit
      - run: npx playwright install --with-deps chromium firefox
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium firefox
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      # Run against chromium and firefox; WebKit/Safari is macOS-only and
      # tested locally. The webServer config in playwright.config.ts starts
      # the Vite dev server automatically in CI.
      - run: npx playwright test --project=chromium --project=firefox

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
