# render.yaml — Render Blueprint for Kinetic
# https://render.com/docs/blueprint-spec
#
# ── Post-deploy setup checklist (complete in Render dashboard) ────────────────
#
#  kinetic-api:
#   1. Environment → Secret Files: upload credentials.toml at /etc/secrets/credentials.toml
#      (copy credentials.toml.example, fill in real bcrypt hashes)
#   2. Environment → GEMINI_API_KEY: your Gemini API key
#   3. Environment → FRONTEND_URL: your kinetic-frontend URL
#      https://kinetic-frontend-c2bd.onrender.com
#
#  kinetic-frontend:
#   4. Environment → VITE_API_BASE_URL: your kinetic-api URL
#      https://kinetic-api-drk6.onrender.com
#   5. Trigger a manual redeploy of kinetic-frontend so Vite bakes VITE_API_BASE_URL in.
#
databases:
  - name: kinetic-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: kinetic-api
    runtime: python
    region: oregon
    plan: starter          # starter keeps the service always-on (no cold-start spin-down)
    buildCommand: pip install uv && uv sync --no-dev
    preDeployCommand: uv run python scripts/migrate.py
    startCommand: uv run uvicorn kinetic.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIALS_PATH
        value: /etc/secrets/credentials.toml
      - key: GEMINI_API_KEY
        sync: false        # set in Render dashboard (step 2 above)
      - key: FRONTEND_URL
        sync: false        # set in Render dashboard (step 3 above)
      - key: DATABASE_URL
        fromDatabase:
          name: kinetic-db
          property: connectionString

  # ── Frontend (static site) ───────────────────────────────────────────────────
  - type: web
    name: kinetic-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # set in Render dashboard (steps 4-5 above)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
