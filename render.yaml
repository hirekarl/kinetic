# Render Blueprint — https://render.com/docs/blueprint-spec
# Two services: Python/FastAPI API + React/Vite static site.
#
# First deploy: set GEMINI_API_KEY in the Render dashboard for kinetic-api.
# Then set VITE_API_BASE_URL in kinetic-frontend to point at the API service URL.

services:
  # ── Backend: FastAPI API ────────────────────────────────────────────────
  - type: web
    name: kinetic-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn kinetic.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard — never committed

  # ── Frontend: React / Vite static site ─────────────────────────────────
  - type: web
    name: kinetic-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set to https://kinetic-api.onrender.com after first API deploy
